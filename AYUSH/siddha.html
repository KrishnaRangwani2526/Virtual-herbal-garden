<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Screen Webpage with Smooth Slide Iframe</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .container {
    display: flex;
    width: 100%;
    height: 100vh;
  }

  /* LEFT SIDE */
  .left {
    width: 45%;
    position: relative;
    background: url('../images/siddha.png') no-repeat center center;
    background-size: cover;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding-left: 30px;
    gap: 20px;
    overflow: hidden;
  }

  .left img {
    width: 60px;
    height: 60px;
    cursor: pointer;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.3);
    border: 2px solid rgba(255, 255, 255, 0.6);
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
  }

  .left img:hover {
    transform: scale(1.2);
    box-shadow: 0 0 15px rgba(255,255,255,0.8);
    background: rgba(255, 255, 255, 0.5);
  }

  /* RIGHT SIDE */
  .right {
    width: 55%;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    transform: translateX(100%);
    opacity: 0;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), 
                opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  iframe.active {
    transform: translateX(0);
    opacity: 1;
  }

  /* RESPONSIVE */
  @media(max-width: 900px) {
    .container {
      flex-direction: column;
    }
    .left, .right {
      width: 100%;
      height: 50vh;
    }
    iframe {
      transform: translateY(100%);
    }
    iframe.active {
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<div class="container">
  <!-- LEFT SIDE -->
  <div class="left">
    <img src="../icons/icon1.png" alt="Page 1" onclick="loadPage('each_plant.html', this)">
    <img src="../icons/icon2.png" alt="Page 2" onclick="loadPage('https://example2.com', this)">
    <img src="../icons/icon3.png" alt="Page 3" onclick="loadPage('https://example3.com', this)">
    <img src="../icons/icon4.png" alt="Page 4" onclick="loadPage('https://example4.com', this)">
    <img src="../icons/icon5.png" alt="Page 5" onclick="loadPage('https://example5.com', this)">
  </div>

  <!-- RIGHT SIDE -->
  <div class="right">
    <iframe id="rightFrame" src="../default/default2.html" class="active"></iframe>
  </div>
</div>

<script>
  const buttons = document.querySelectorAll('.left img');
  const iframe = document.getElementById('rightFrame');

  function loadPage(url, btn) {
    // Highlight clicked button
    buttons.forEach(b => b.style.boxShadow = '');
    btn.style.boxShadow = '0 0 15px 5px rgba(255,255,0,0.7)';

    // Slide out iframe
    iframe.classList.remove('active');

    // Change iframe src after short delay, then slide in smoothly
    setTimeout(() => {
      iframe.src = url;
      iframe.classList.add('active');
    }, 300); 
  }
</script>

</body>
</html>
